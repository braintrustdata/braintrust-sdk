name: Agent Automation

on:
  schedule:
    - cron: "0 6 * * *" # nightly UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-gap-audit:
    uses: braintrustdata/sdk-actions/.github/workflows/agent-automation-reusable.yml@eeb44cc4c6ea61507d77c54c0bc430b96e7b1ea0
    with:
      target_owner: ${{ github.repository_owner }}
      target_repo: ${{ github.event.repository.name }}
      max_issues: 3
    secrets:
      braintrust_bot_app_id: ${{ secrets.BRAINTRUST_BOT_APP_ID }}
      braintrust_bot_private_key: ${{ secrets.BRAINTRUST_BOT_PRIVATE_KEY }}
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
